name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      mysql_real_signoff:
        description: Run guarded company MySQL real sign-off with repository secrets
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  release-check:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: otsandbox_ci_smoke
          MYSQL_ROOT_PASSWORD: ci-store-pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-store-pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release gate tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install npm dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install chromium

      - name: Run release gate
        run: npm run release-check
        env:
          OTSANDBOX_SMOKE_STORE_DSN: mysql://root:ci-store-pass@127.0.0.1:3306/otsandbox_ci_smoke?tls=false

  mysql-real-signoff:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mysql_real_signoff == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release gate tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install npm dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install chromium

      - name: Run guarded company MySQL real sign-off preflight
        run: npm run release-check:mysql-real:preflight
        env:
          OTSANDBOX_REQUIRE_REAL_SKYWALKING: "1"
          OTSANDBOX_REAL_MYSQL_STORE_DSN: ${{ secrets.OTSANDBOX_REAL_MYSQL_STORE_DSN }}
          OTS_TRACE_GRAPHQL_URL: ${{ secrets.OTS_TRACE_GRAPHQL_URL }}
          OTS_SMOKE_TRACE_IDS: ${{ secrets.OTS_SMOKE_TRACE_IDS }}

      - name: Run guarded company MySQL real sign-off
        run: npm run release-check:mysql-real
        env:
          OTSANDBOX_REQUIRE_REAL_SKYWALKING: "1"
          OTSANDBOX_REAL_MYSQL_STORE_DSN: ${{ secrets.OTSANDBOX_REAL_MYSQL_STORE_DSN }}
          OTS_TRACE_GRAPHQL_URL: ${{ secrets.OTS_TRACE_GRAPHQL_URL }}
          OTS_SMOKE_TRACE_IDS: ${{ secrets.OTS_SMOKE_TRACE_IDS }}
