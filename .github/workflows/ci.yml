name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      mysql_real_signoff:
        description: Run guarded company MySQL real sign-off with repository secrets
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install secret scan tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run deterministic secret scan
        run: npm run guard:secrets

  release-check:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: agent_testbench_ci_smoke
          MYSQL_ROOT_PASSWORD: ci-store-pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-store-pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release gate tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep sqlite3

      - name: Install Go lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install npm dependencies
        run: npm ci

      - name: Run dependency baseline
        run: npm run guard:dependencies

      - name: Collect release scope
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}" HEAD > .release-check-scope
          sed 's/^/release scope: /' .release-check-scope

      - name: Run Go lint
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            make lint
          else
            make lint-full
          fi

      - name: Install browser
        run: npx playwright install chromium

      - name: Run release gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && -s .release-check-scope ]]; then
            npm run release-check -- --scope-file .release-check-scope
          else
            npm run release-check -- --full
          fi
        env:
          AGENT_TESTBENCH_SMOKE_STORE_DSN: mysql://root:ci-store-pass@127.0.0.1:3306/agent_testbench_ci_smoke?tls=false
          AGENT_TESTBENCH_SKIP_GO_LINT: "1"

      - name: Upload quality gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: build/reports/quality-gate
          if-no-files-found: ignore

  mysql-real-signoff:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mysql_real_signoff == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release gate tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install npm dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install chromium

      - name: Run guarded company MySQL real sign-off preflight
        run: npm run release-check:mysql-real:preflight
        env:
          AGENT_TESTBENCH_REQUIRE_REAL_SKYWALKING: "1"
          AGENT_TESTBENCH_REAL_MYSQL_STORE_DSN: ${{ secrets.AGENT_TESTBENCH_REAL_MYSQL_STORE_DSN }}
          AGENT_TESTBENCH_TRACE_GRAPHQL_URL: ${{ secrets.AGENT_TESTBENCH_TRACE_GRAPHQL_URL }}
          AGENT_TESTBENCH_SMOKE_TRACE_IDS: ${{ secrets.AGENT_TESTBENCH_SMOKE_TRACE_IDS }}

      - name: Run guarded company MySQL real sign-off
        run: npm run release-check:mysql-real
        env:
          AGENT_TESTBENCH_REQUIRE_REAL_SKYWALKING: "1"
          AGENT_TESTBENCH_REAL_MYSQL_STORE_DSN: ${{ secrets.AGENT_TESTBENCH_REAL_MYSQL_STORE_DSN }}
          AGENT_TESTBENCH_TRACE_GRAPHQL_URL: ${{ secrets.AGENT_TESTBENCH_TRACE_GRAPHQL_URL }}
          AGENT_TESTBENCH_SMOKE_TRACE_IDS: ${{ secrets.AGENT_TESTBENCH_SMOKE_TRACE_IDS }}
